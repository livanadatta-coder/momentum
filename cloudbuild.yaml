# Builds the Docker image with the Vite env vars baked in via substitutions,
# pushes it to Artifact Registry, then deploys it to Cloud Run.
#
# Run with:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_VITE_FIREBASE_API_KEY="...",_VITE_FIREBASE_AUTH_DOMAIN="...",_VITE_FIREBASE_PROJECT_ID="...",_VITE_FIREBASE_STORAGE_BUCKET="...",_VITE_FIREBASE_MESSAGING_SENDER_ID="...",_VITE_FIREBASE_APP_ID="...",_VITE_FIREBASE_APP_MEASUREMENT_ID="...",_VITE_GEMINI_API_KEY="..."
#
# See DEPLOY.md for the full runbook (region, Artifact Registry setup, etc).

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_IMAGE}"
      - "--build-arg"
      - "VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}"
      - "--build-arg"
      - "VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg"
      - "VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}"
      - "--build-arg"
      - "VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}"
      - "--build-arg"
      - "VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}"
      - "--build-arg"
      - "VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}"
      - "--build-arg"
      - "VITE_FIREBASE_APP_MEASUREMENT_ID=${_VITE_FIREBASE_APP_MEASUREMENT_ID}"
      - "--build-arg"
      - "VITE_GEMINI_API_KEY=${_VITE_GEMINI_API_KEY}"
      - "."

images:
  - "${_IMAGE}"

substitutions:
  _IMAGE: "gcr.io/${PROJECT_ID}/momentum:latest"

options:
  logging: CLOUD_LOGGING_ONLY
